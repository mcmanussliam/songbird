# Self-hosting on-ramp for Songbird's sync service. See system-design.md §12.2.
#
# Self-hosting must yield 100% feature parity with the managed tier, including E2EE — that
# guarantee holds by construction (the server never holds a decryption key, see §8), not by
# what's configured here. This compose file is a starting point for M4+; fill in real values
# before use.

version: "3.9"

services:
  songbird-server:
    build:
      context: ../
      dockerfile: songbird-server/Dockerfile   # TODO(M4): write this Dockerfile
    environment:
      DATABASE_URL: postgres://songbird:songbird@postgres:5432/songbird
      REDIS_URL: redis://redis:6379
      # UnifiedPush distributor config, or FCM/APNs credentials as the default-easy-path
      # fallback for self-hosters who don't mind depending on Google/Apple push infra.
      PUSH_BACKEND: unifiedpush   # or: fcm, apns
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: songbird
      POSTGRES_PASSWORD: songbird
      POSTGRES_DB: songbird
    volumes:
      - songbird-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  # Reverse proxy / TLS termination — Caddy chosen for automatic HTTPS with minimal config.
  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile   # TODO(M4): write this
      - songbird-caddy-data:/data

volumes:
  songbird-postgres-data:
  songbird-caddy-data:
