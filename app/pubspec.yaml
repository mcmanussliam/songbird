name: songbird
description: >
  Songbird — a local-first, end-to-end-encrypted, group-first shared calendar.
  Flutter UI layer; business logic lives in ../core (Rust), bridged via flutter_rust_bridge.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.0.0
  flutter_local_notifications: ^17.0.0
  flutter_rust_bridge: 2.12.0
  path_provider: ^2.1.0
  path: ^1.9.0
  songbird_core:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
